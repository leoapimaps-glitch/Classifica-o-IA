{% extends "base.html" %}

{% block title %}Login Admin | Classificacao{% endblock %}

{% block content %}
<section class="panel form-panel" style="max-width: 560px; margin: 24px auto 0;">
    <form method="post" action="/admin/login">
        <div class="panel-header">
            <span class="pill">Admin</span>
            <h2>Entrar no painel</h2>
        </div>

        {% if error %}
        <div class="alert error">{{ error }}</div>
        {% endif %}

        <label class="field">
            <span>Login admin</span>
            <input type="text" name="login" placeholder="Ex: admin" autocomplete="username" required>
        </label>

        <label class="field">
            <span>Senha admin</span>
            <input type="password" name="senha" placeholder="Digite a senha de admin" autocomplete="current-password" required>
        </label>

        <button class="primary-button" type="submit">Acessar painel</button>
    </form>
</section>
{% endblock %}
