services:
  - type: web
    name: classificacao-clientes
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: HF_API_TOKEN
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SHEETS_TAB
        value: Respostas
      - key: ADMIN_LOGIN
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
